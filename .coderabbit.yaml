# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
tone_instructions: >-
  Be concise and technical. Focus on correctness, nullability, async
  correctness (ConfigureAwait, cancellation propagation), and public API
  design. .NET library: warnings-as-errors, file-scoped namespaces, XML
  docs on public members.

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - "!**/bin/**"
    - "!**/obj/**"
    - "!**/*.min.*"
  path_instructions:
    - path: "src/**/*.cs"
      instructions: >-
        Public members must carry XML doc comments. Prefer file-scoped
        namespaces. Async methods should accept and honor a CancellationToken
        and use ConfigureAwait(false) in library code. Flag nullable-reference
        violations and any swallowed exceptions.
    - path: "tests/**/*.cs"
      instructions: >-
        Tests are xUnit behavior tests over a scripted FakeChatClient. Prefer
        clear Arrange/Act/Assert structure and descriptive test names.
  # Finishing touches expose the fix commands/checkboxes. Enabling autofix does
  # NOT auto-apply anything — a human still triggers it. Prefer
  # "@coderabbitai autofix stacked pr" so fixes land in a separate PR you
  # review before they touch the branch.
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true
    autofix:
      enabled: true

# CodeRabbit's project memory. It compounds two ways as the repo is built out:
#  1. code_guidelines are re-read on every review, so any convention added to
#     CLAUDE.md / CONTRIBUTING.md / .editorconfig takes effect automatically.
#  2. learnings persist the corrections you give CodeRabbit in PR threads
#     ("our convention is X"), scoped to THIS repo, and are reused in later
#     reviews — so the reviewer gets more project-aware over time.
knowledge_base:
  opt_out: false
  code_guidelines:
    enabled: true
    filePatterns:
      - "CLAUDE.md"
      - "CONTRIBUTING.md"
      - ".editorconfig"
      - ".github/copilot-instructions.md"
  learnings:
    scope: local
  pull_requests:
    scope: local
  issues:
    scope: local

chat:
  auto_reply: true
