version: 2
updates:
  # .NET dependencies (Microsoft.Extensions.AI.Abstractions, xunit, test SDK, …)
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Batch low-risk updates into a single PR to cut review noise.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Keep the GitHub Actions used in workflows current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
