name: Release

# Publishes the Ingot package to NuGet when a v* tag is pushed. The tag drives the version
# (v0.2.0 -> 0.2.0), so no csproj edit is needed to ship. Auth uses NuGet Trusted Publishing
# (OIDC) — no stored API key. Requires a Trusted Publishing policy on nuget.org for this repo +
# workflow, and a NUGET_USER secret set to your nuget.org username.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write   # mint the GitHub OIDC token that NuGet exchanges for a short-lived key

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  publish:
    name: Pack & push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # full history so SourceLink embeds the right commit
          persist-credentials: false  # no git push in this job; don't leave the token in .git/config

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Derive and validate version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not map to a valid NuGet/SemVer version ('$VERSION')."
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Pack
        run: dotnet pack src/Ingot --configuration Release -p:Version="$VERSION" -o ./artifacts

      # Exchange the GitHub OIDC token for a short-lived NuGet key, immediately before the push.
      - name: Authenticate to NuGet (trusted publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: |
          for pkg in ./artifacts/*.nupkg; do
            dotnet nuget push "$pkg" \
              --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
