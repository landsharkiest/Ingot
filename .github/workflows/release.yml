name: Release

# Publishes the Ingot package to NuGet when a v* tag is pushed. The tag drives the version
# (v0.2.0 -> 0.2.0), so no csproj edit is needed to ship. Requires a NUGET_API_KEY secret.
on:
  push:
    tags: ['v*']

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  publish:
    name: Pack & push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so SourceLink embeds the right commit

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Pack
        run: dotnet pack src/Ingot --configuration Release -p:Version="$VERSION" -o ./artifacts

      - name: Push to NuGet
        run: >-
          dotnet nuget push "./artifacts/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
